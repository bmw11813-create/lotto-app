// ===== localStorage 기반 저장소 (휴대폰/PC 영구 저장) =====
// 일반 웹(GitHub Pages 등)에서는 window.storage가 없으므로 localStorage로 직접 구현
if (typeof window.storage === 'undefined') {
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v } : null;
    },
    set: async (key, value) => { localStorage.setItem(key, value); return { key, value }; },
    delete: async (key) => {
      const had = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: had };
    },
    list: async (prefix) => {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    }
  };
}

// ===== 🤖 자동 전략 계산 엔진 =====
// 저장된 당첨번호 기록(최근 20회)에서 7전략 설정값을 자동 산출
function computeEngine(historyRaw) {
  let history = (historyRaw || []).filter(r => r && Array.isArray(r.nums) && r.nums.length === 6);
  // 저장 데이터가 부족하면 시드 데이터로 보완
  if (history.length < 5) {
    const have = new Set(history.map(r => r.round));
    history = [...history, ...SEED_HISTORY.filter(r => !have.has(r.round))];
  }
  const h = [...history].sort((a, b) => b.round - a.round).slice(0, 20); // 최신 20회
  const recent = [...h].reverse(); // 오래된→최신

  const freq = {};
  for (let i = 1; i <= 45; i++) freq[i] = 0;
  for (const r of h) for (const n of r.nums) freq[n]++;

  const lastSeen = {};
  for (let i = 1; i <= 45; i++) lastSeen[i] = 999;
  recent.forEach((r, idx) => {
    const ago = recent.length - 1 - idx;
    for (const n of r.nums) if (ago < lastSeen[n]) lastSeen[n] = ago;
  });

  // Y 미출현폭탄: 0회 → 없으면 1회
  let yPool = Object.keys(freq).filter(n => freq[n] === 0).map(Number);
  if (yPool.length === 0) yPool = Object.keys(freq).filter(n => freq[n] === 1).map(Number);
  const Y_fixed = yPool.slice(0, 3);

  // X 보너스추적: 최근 3회 보너스
  const recentBonuses = h.slice(0, 4).map(r => r.bonus).filter(Boolean);
  const X_fixed = [...new Set(recentBonuses)].slice(0, 3);

  // W 이월수: 직전 회차 본번호
  const W_fixed = [...h[0].nums];

  // Z 휴식회귀: 강세(빈도4+)였지만 최근 4회+ 안 나온 번호
  const strongRested = Object.keys(freq).map(Number)
    .filter(n => freq[n] >= 4 && lastSeen[n] >= 4)
    .sort((a, b) => freq[b] - freq[a]);
  const Z_fixed = strongRested.length > 0 ? strongRested.slice(0, 3) : [...Y_fixed];
  const Z_fallback = strongRested.length === 0;

  // 풀
  const sortedByFreq = Object.keys(freq).map(Number).sort((a, b) => freq[b] - freq[a]);
  const strongPool = sortedByFreq.filter(n => freq[n] >= 4).slice(0, 12);
  const oncePool = Object.keys(freq).filter(n => freq[n] <= 1).map(Number);
  const midPool = Object.keys(freq).filter(n => freq[n] === 2 || freq[n] === 3).map(Number);

  // V 끝수: 0~9 중 가장 적게 나온 끝자리 자동 추출 → 그 끝자리 번호들
  const digitCount = {};
  for (let d = 0; d <= 9; d++) digitCount[d] = 0;
  for (const r of h) for (const n of r.nums) digitCount[n % 10]++;
  const weakestDigit = Object.keys(digitCount)
    .map(Number)
    .sort((a, b) => digitCount[a] - digitCount[b])[0];
  const V_fixed = [];
  for (let n = 1; n <= 45; n++) if (n % 10 === weakestDigit) V_fixed.push(n);

  // U 합계정밀: 최근 20회 당첨합계 평균 ±13 → 자동 범위
  const sums = h.map(r => r.nums.reduce((a, c) => a + c, 0));
  const avgSum = Math.round(sums.reduce((a, c) => a + c, 0) / sums.length);
  const U_sumMin = Math.max(90, avgSum - 13);
  const U_sumMax = Math.min(190, avgSum + 13);

  return {
    baseRange: `${recent[0].round}~${h[0].round}`,
    rounds: h.length, lastRound: h[0].round, freq, lastSeen,
    X_fixed, Y_fixed, Z_fixed, Z_fallback, W_fixed,
    V_fixed, weakestDigit, digitCount,
    U_sumMin, U_sumMax, avgSum,
    pools: {
      미출현: yPool.filter(n => freq[n] === 0),
      일회: oncePool, 강세: strongPool, 중간: midPool,
      하위: [...new Set([...oncePool, ...midPool])],
    },
    recentBonuses,
  };
}

}

function isValid(nums, sumMin = 110, sumMax = 160) {
  if (nums.length !== 6) return false;
  const s = [...nums].sort((a, b) => a - b);
  const sum = s.reduce((a, b) => a + b, 0);
  if (sum < sumMin || sum > sumMax) return false;
  const low = s.filter(n => n <= 15).length;
  const mid = s.filter(n => n >= 16 && n <= 30).length;
  const high = s.filter(n => n >= 31).length;
  if (low === 0 || mid === 0 || high === 0) return false;
  const odd = s.filter(n => n % 2 === 1).length;
  if (odd < 2 || odd > 4) return false;
  let pairs = 0;
  for (let i = 0; i < 5; i++) if (s[i + 1] - s[i] === 1) pairs++;
  if (pairs > 1) return false;
  return true;
}

// 🆕 대중성 점수: 높을수록 남들이 많이 골라 당첨 시 분배 인원↑ (나쁨)
function popularityScore(arr, lastWin) {
  const s = [...arr].sort((a, b) => a - b);
  let p = 0;
  const sum = s.reduce((a, b) => a + b, 0);
  if (sum < 100) p += 5;
  else if (sum <= 119) p += 2;
  else if (sum <= 180) p += 0;        // 스위트존
  else if (sum <= 200) p += 1;
  else p += 3;
  const highCnt = s.filter(n => n >= 32).length;     // 32+(생일대 밖) 최소 2개 유도
  p += Math.max(0, 2 - highCnt) * 2;
  let run = 1, maxRun = 1;                            // 가장 긴 연속런
  for (let i = 1; i < s.length; i++) {
    if (s[i] - s[i - 1] === 1) { run++; if (run > maxRun) maxRun = run; } else run = 1;
  }
  if (maxRun >= 3) p += 2;
  const diffs = [];                                  // 등차수열
  for (let i = 1; i < s.length; i++) diffs.push(s[i] - s[i - 1]);
  if (diffs.every(d => d === diffs[0])) p += 5;       // 6개 등차
  else {
    let arith5 = false;                              // 5개(연속 4간격) 등차
    for (let i = 0; i + 3 < diffs.length; i++) {
      if (diffs[i] === diffs[i + 1] && diffs[i + 1] === diffs[i + 2] && diffs[i + 2] === diffs[i + 3]) { arith5 = true; break; }
    }
    if (arith5) p += 2;
  }
  const band = {};                                   // 십의자리 구간 4개+ 몰림
  for (const n of s) { const b = Math.floor(n / 10); band[b] = (band[b] || 0) + 1; }
  if (Object.values(band).some(c => c >= 4)) p += 2;
  if (lastWin && lastWin.length) {                   // 직전 회차와 3개+ 겹침
    if (s.filter(n => lastWin.includes(n)).length >= 3) p += 3;
  }
  const isSeq = s.every((n, i) => n === i + 1);       // 유명 패턴
  const allMult5 = s.every(n => n % 5 === 0);
  if (isSeq || allMult5) p += 10;
  return p;
}

// 🆕 분배회피 한 줄: 유효 조합 1500개 → 점수 오름차순 → 하위 5%에서 무작위 추출
function generateAntiPopularLine(cfg) {
  const CAND = 1500;
  const pool = [];
  let attempts = 0;
  while (pool.length < CAND && attempts < 40000) {
    attempts++;
    const set = new Set();
    while (set.size < 6) set.add(Math.floor(Math.random() * 45) + 1);
    const arr = [...set].sort((a, b) => a - b);
    if (isValid(arr, 120, 175)) pool.push(arr);       // 분배 최소 구간(합 160~180) 확보 위해 범위 확장
  }
  if (pool.length === 0) return null;
  const scored = pool.map(a => ({ a, sc: popularityScore(a, cfg.lastWin) }))
                     .sort((x, y) => x.sc - y.sc);    // 덜 대중적(점수↓)이 앞으로
  const cut = Math.max(1, Math.floor(scored.length * 0.05));
  return scored[Math.floor(Math.random() * cut)].a;   // 하위 5%에서 랜덤 → 매번 살짝 다름
}

function generateLine(strategy, STRATEGIES, POOLS) {
  const cfg = STRATEGIES[strategy];
  const sumMin = cfg.sumMin || 110;
  const sumMax = cfg.sumMax || 160;

  // 🆕 분배회피: 대중성 점수가 낮은(덜 대중적인) 조합 추천
  if (cfg.special === 'antipopular') return generateAntiPopularLine(cfg);

  const FILL_POOL = [...new Set([...POOLS.미출현, ...POOLS.일회, ...POOLS.강세, ...POOLS.중간])];
  for (let attempt = 0; attempt < 300; attempt++) {
    const nums = new Set();
    const fixedCount = Math.floor(Math.random() * (cfg.fixedMax - cfg.fixedMin + 1)) + cfg.fixedMin;
    const shuf = [...(cfg.fixed || [])].sort(() => Math.random() - 0.5);
    for (let i = 0; i < fixedCount && i < shuf.length; i++) nums.add(shuf[i]);
    const fillShuf = FILL_POOL.filter(n => !nums.has(n)).sort(() => Math.random() - 0.5);
    for (const n of fillShuf) { if (nums.size >= 6) break; nums.add(n); }
    if (nums.size < 6) {
      const all = Array.from({ length: 45 }, (_, i) => i + 1).filter(n => !nums.has(n));
      const allShuf = all.sort(() => Math.random() - 0.5);
      for (const n of allShuf) { if (nums.size >= 6) break; nums.add(n); }
    }
    const arr = [...nums].sort((a, b) => a - b);
    if (isValid(arr, sumMin, sumMax)) return arr;
  }
  return null;
}

function generateBatch(strategy, count, STRATEGIES, POOLS) {
  if (strategy === 'MIX') {
    const result = [];
    for (const [s, w] of Object.entries(MIXED_WEIGHTS)) {
      for (let i = 0; i < w; i++) {
        const n = generateLine(s, STRATEGIES, POOLS);
        if (n) result.push({ strategy: s, numbers: n });
      }
    }
    return result.slice(0, count);
  }
  const result = [];
  let attempts = 0;
  while (result.length < count && attempts < count * 5) {
    const n = generateLine(strategy, STRATEGIES, POOLS);
    if (n) {
      const exists = result.some(r => r.numbers.join(',') === n.join(','));
      if (!exists) result.push({ strategy, numbers: n });
    }
    attempts++;
  }
  return result;
}

function generateBacktest30(STRATEGIES, POOLS) {
  const games = [];
  let id = 1;
  for (const [strat, count] of Object.entries(BACKTEST_DIST)) {
    for (let i = 0; i < count; i++) {
      const n = generateLine(strat, STRATEGIES, POOLS);
      if (n) games.push({ id: id++, strategy: strat, numbers: n });
    }
  }
  return games;
}

function calculatePrize(numbers, winNums, bonus) {
  const matches = numbers.filter(n => winNums.includes(n)).length;
  const hasBonus = numbers.includes(bonus);
  if (matches === 6) return { tier: 1, amount: 2000000000, label: '1등' };
  if (matches === 5 && hasBonus) return { tier: 2, amount: 50000000, label: '2등' };
  if (matches === 5) return { tier: 3, amount: 1500000, label: '3등' };
  if (matches === 4) return { tier: 4, amount: 50000, label: '4등' };
  if (matches === 3) return { tier: 5, amount: 5000, label: '5등' };
  return { tier: 0, amount: 0, label: '낙첨' };
}

function getDefaultRound() {
  const BASE_ROUND = 1225; // 1224 추첨 직후 사야 할 회차
  const BASE_DRAW = new Date('2026-05-16T21:00:00+09:00'); // 1224 추첨 완료 시각
  const now = new Date();
  if (now < BASE_DRAW) return 1224; // 아직 1224 추첨 전
  const weeks = Math.floor((now - BASE_DRAW) / (7 * 24 * 60 * 60 * 1000));
  return BASE_ROUND + weeks;
}

              <div className={`${card} rounded-2xl shadow-md p-4 text-center`}>
                <div className={`text-xs ${textDim}`}>매칭 완료</div>
                <div className="text-3xl font-bold text-blue-500 mt-1">{stats.matchedRounds}</div>
              </div>
            </div>
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="text-sm font-bold mb-3">등수별 적중</div>
              <div className="space-y-2">
                {[1, 2, 3, 4, 5].map(t => {
                  const c = stats.tiers[t] || 0;
                  const labels = { 1: '1등', 2: '2등', 3: '3등', 4: '4등', 5: '5등' };
                  const colors = { 1: 'bg-purple-500', 2: 'bg-pink-500', 3: 'bg-orange-500', 4: 'bg-yellow-500', 5: 'bg-emerald-500' };
                  return (
                    <div key={t} className="flex items-center gap-3">
                      <span className={`${colors[t]} text-white text-xs font-bold px-2.5 py-1 rounded-full w-12 text-center`}>{labels[t]}</span>
                      <div className={`flex-1 ${dark ? 'bg-slate-700' : 'bg-slate-100'} rounded-full h-6 overflow-hidden`}>
                        <div className={`${colors[t]} h-full transition-all`} style={{ width: c > 0 ? `${Math.min(c * 20, 100)}%` : '0%' }} />
                      </div>
                      <span className="font-bold w-8 text-right">{c}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            {stats.recommended.length > 0 && stats.matchedRounds > 0 && (
              <div className={`${card} rounded-2xl shadow-md p-4`}>
                <div className="text-sm font-bold mb-3 flex items-center gap-2">
                  <Target className="w-4 h-4 text-emerald-500" /> 추천 전략 (실적순)
                </div>
                <div className="space-y-2">
                  {stats.recommended.map((r, i) => (
                    <div key={r.s} className={`flex items-center gap-3 p-2 rounded-lg ${i === 0 ? (dark ? 'bg-emerald-900/30' : 'bg-emerald-50') : ''}`}>
                      <span className="text-xl">{STRATEGIES[r.s]?.emoji}</span>
                      <div className="flex-1">
                        <div className="font-bold text-sm">전략 {r.s} · {STRATEGIES[r.s]?.name}</div>
                        <div className={`text-xs ${textDim}`}>{r.lines}줄 / {r.wins}당첨 · ROI {(r.roi * 100).toFixed(0)}%</div>
                      </div>
                      {i === 0 && <span className="text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold">BEST</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {stats.matchedRounds > 0 && (
              <div className={`${card} rounded-2xl shadow-md p-4`}>
                <div className="text-sm font-bold mb-3 flex items-center gap-2">
                  <BarChart3 className="w-4 h-4 text-blue-500" /> 당첨번호 출현 빈도
                </div>
                <div className="grid grid-cols-9 gap-1">
                  {Array.from({ length: 45 }, (_, i) => i + 1).map(n => {
                    const c = stats.numHits[n];
                    const max = Math.max(...Object.values(stats.numHits), 1);
                    const intensity = c / max;
                    return (
                      <div key={n} className="text-center">
                        <div className={`w-full aspect-square rounded flex items-center justify-center text-[10px] font-bold ${c > 0 ? ballClass(n) : (dark ? 'bg-slate-700 text-slate-500' : 'bg-slate-100 text-slate-400')}`}
                          style={{ opacity: c > 0 ? 0.4 + intensity * 0.6 : 1 }}>{n}</div>
                        <div className={`text-[9px] mt-0.5 ${textDim}`}>{c}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="text-sm font-bold mb-3">7전략 가이드</div>
              <div className="space-y-1.5 text-xs">
                {Object.entries(STRATEGIES).map(([k, s]) => (
                  <div key={k} className={`flex items-start gap-2 py-1.5 border-b ${dark ? 'border-slate-700' : 'border-slate-100'} last:border-0`}>
                    <span className="text-lg">{s.emoji}</span>
                    <div className="flex-1">
                      <div className="font-semibold">전략 {k} · {s.name}</div>
                      <div className={textDim}>{s.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ===== 설정 ===== */}
        {tab === 'set' && (
          <div className="space-y-4">
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="font-bold mb-3 flex items-center gap-2">
                <FlaskConical className="w-4 h-4 text-purple-500" /> 백테스트 사용법
              </div>
              <div className={`text-xs ${textDim} space-y-1.5 leading-relaxed`}>
                <p>매칭 탭의 <strong>"과거 회차 조회"</strong>에서 1~1223 사이 아무 회차나 입력하면:</p>
                <p>① <strong>당첨번호 조회</strong> - 그 회차 당첨번호 보기</p>
                <p>② <strong>기록 저장</strong> - 통계용으로 회차 기록만 저장</p>
                <p>③ <strong>30줄 백테스트</strong> - 7전략 30줄을 그 회차에 적용해서 가상 결과 확인</p>
                <p className="text-purple-600 dark:text-purple-400 mt-2">💡 백테스트로 본인 전략이 과거에 어땠을지 검증 가능!</p>
              </div>
            </div>
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="font-bold mb-3 flex items-center gap-2"><Cloud className="w-4 h-4 text-blue-500" /> 자동 불러오기 안내</div>
              <div className={`text-xs ${textDim} space-y-1.5 leading-relaxed`}>
                <p>매칭 탭의 <strong>"자동 불러오기"</strong>는 동행복권 공식 API 사용.</p>
                <p>저장 탭의 <strong>"미매칭 전체 자동"</strong>은 일괄 처리.</p>
                <p className="text-amber-600 dark:text-amber-400 mt-2">⚠️ 공용 프록시 사용. 가끔 실패 시 수동 입력 권장.</p>
              </div>
            </div>
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="font-bold mb-3 flex items-center gap-2"><Download className="w-4 h-4" /> 데이터 백업/복원</div>
              <button onClick={handleExport} className="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 mb-2">
                <Download className="w-4 h-4" /> JSON 백업
              </button>
              <button onClick={handleImportClick} className={`w-full ${dark ? 'bg-slate-700' : 'bg-slate-200'} py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95`}>
                <Upload className="w-4 h-4" /> JSON 복원
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
            </div>
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="font-bold mb-3">화면 모드</div>
              <button onClick={toggleDark} className="w-full flex items-center justify-between p-3 rounded-xl border-2 border-emerald-500 active:scale-95">
                <span className="font-semibold">{dark ? '🌙 다크' : '☀️ 라이트'}</span>
                <span className={`text-xs ${textDim}`}>탭하여 변경</span>
              </button>
            </div>
            <div className={`${card} rounded-2xl shadow-md p-4`}>
              <div className="font-bold mb-3 flex items-center gap-2"><RefreshCw className="w-4 h-4 text-orange-500" /> 앱 버전 / 업데이트</div>
              <div className="flex items-center justify-between mb-3">
                <span className={`text-sm ${textDim}`}>현재 버전</span>
                <span className="font-bold">v{APP_VERSION}{updateAvailable ? ` → 신규 v${latestVer} 있음` : ' (최신)'}</span>
              </div>
              <button onClick={handleUpdate}
                className="w-full bg-orange-500 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95">
                <RefreshCw className="w-4 h-4" /> 지금 새로고침 (캐시 비우고 최신화)
              </button>
              <p className={`text-[11px] ${textDim} mt-2 leading-relaxed`}>
                평소엔 새 버전이 나오면 상단에 자동으로 알림이 뜹니다. 화면이 옛날 그대로면 이 버튼을 누르세요. (저장 데이터는 유지됩니다)
              </p>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-xs text-amber-900">
              <div className="font-bold mb-1 flex items-center gap-1"><AlertCircle className="w-4 h-4" /> 안내</div>
              <p className="leading-relaxed">로또는 무작위 추첨, 어떤 분석도 당첨 보장 안 됨. 통계 참고용 (1336 도박상담).</p>
              <p className="mt-2 font-semibold">v6.0 · 2026.5.17 · V·U 끝수·합계 자동화</p>
            </div>
          </div>
        )}
      </div>

      <div className={`fixed bottom-0 left-0 right-0 ${tabBar} border-t shadow-2xl z-30`}>
        <div className="grid grid-cols-5">
          {[
            { id: 'gen', icon: Sparkles, label: '생성' },
            { id: 'saved', icon: Save, label: '저장' },
            { id: 'match', icon: Trophy, label: '매칭' },
            { id: 'stats', icon: BarChart3, label: '통계' },
            { id: 'set', icon: Settings, label: '설정' }
          ].map(t => {
            const Icon = t.icon;
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`py-2.5 flex flex-col items-center gap-1 transition-colors relative ${active ? 'text-emerald-600' : textDim}`}>
                <Icon className={`w-5 h-5 ${active ? 'scale-110' : ''} transition-transform`} />
                <span className="text-[11px] font-semibold">{t.label}</span>
                {active && <div className="absolute bottom-0 w-8 h-0.5 bg-emerald-500 rounded-full" />}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
